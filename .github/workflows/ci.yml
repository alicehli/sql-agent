name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.19.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Packages are built first so the app's workspace imports resolve during typecheck.
      - run: pnpm run build:packages

      - name: Typecheck
        run: pnpm run typecheck

      - name: Tests (packages + app)
        run: pnpm run test:all

      - name: Build
        run: pnpm run build
